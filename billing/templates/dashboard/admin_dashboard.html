<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: #f8f9fb;
            color: #333;
        }

        header {
            background-color: #004080;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .btn {
            display: inline-block;
            background-color: #0078D7;
            color: white;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #005fa3;
        }

        h2 {
            margin-top: 0;
            color: #004080;
        }
    </style>
</head>
<body>
    <header>
        Admin Dashboard
    </header>
    <div class="container">
        <h2>Welcome to the Admin Panel</h2>
        <p>Use the button below to manage your billing and subscription.</p>
        <a href="{% url 'billing:subscribe' %}" class="btn">Manage Subscription</a>
    </div>
</body>
</html>
